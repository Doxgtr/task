<!DOCTYPE html>
<html>
<head>
    <title>Edit Employee</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .container{
            width: 40%;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            margin-bottom: 30px;
        }

        input, select{
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button{
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }

        .back{
            text-decoration: none;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Edit Employee</h1>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="name"
               value="{{ employee.name }}"
               required>

        <input type="email"
               name="email"
               value="{{ employee.email }}"
               required>

        <input type="text"
               name="department"
               value="{{ employee.department }}"
               required>

        <input type="number"
               name="salary"
               value="{{ employee.salary }}"
               required>

        <select name="status">

            <option value="Active"
            {% if employee.status == 'Active' %}
                selected
            {% endif %}
            >
                Active
            </option>

            <option value="Inactive"
            {% if employee.status == 'Inactive' %}
                selected
            {% endif %}
            >
                Inactive
            </option>

        </select>

        <button type="submit">
            Update Employee
        </button>

    </form>

    <br>

    <a href="/" class="back">
        ← Back to Home
    </a>

</div>

</body>
</html>
