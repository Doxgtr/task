<!DOCTYPE html>
<html>
<head>
    <title>Add Employee</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .container{
            width: 40%;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            margin-bottom: 30px;
        }

        input, select{
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button{
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
        }

        button:hover{
            background-color: #218838;
        }

        .message{
            color: red;
            text-align: center;
        }

        .back{
            text-decoration: none;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Add Employee</h1>

    {% if message %}

        <h3 class="message">
            {{ message }}
        </h3>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="name"
               placeholder="Enter Name"
               required>

        <input type="email"
               name="email"
               placeholder="Enter Email"
               required>

        <input type="text"
               name="department"
               placeholder="Enter Department"
               required>

        <input type="number"
               name="salary"
               placeholder="Enter Salary"
               required>

        <select name="status">

            <option value="Active">
                Active
            </option>

            <option value="Inactive">
                Inactive
            </option>

        </select>

        <button type="submit">
            Save Employee
        </button>

    </form>

    <br>

    <a href="/" class="back">
        ← Back to Home
    </a>

</div>

</body>
</html>
